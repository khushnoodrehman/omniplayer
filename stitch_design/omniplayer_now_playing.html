<!-- Implicit Navigation Suppression applied as per Task Guidelines for "Now Playing" Detail screens -->
<script>
        // Micro-interaction for the play button and progress bar simulation
        const playBtn = document.querySelector('.bg-primary-container');
        const progressFill = document.querySelector('.bg-primary.rounded-full');
        let playing = true;
        let progress = 35;

        playBtn.addEventListener('click', () => {
            playing = !playing;
            const icon = playBtn.querySelector('.material-symbols-outlined');
            icon.innerText = playing ? 'pause' : 'play_arrow';
            
            if (playing) {
                playBtn.classList.add('shadow-[0_4px_12px_rgba(189,147,249,0.25)]');
            } else {
                playBtn.classList.remove('shadow-[0_4px_12px_rgba(189,147,249,0.25)]');
            }
        });

        // Simple ticker simulation
        setInterval(() => {
            if (playing && progress < 100) {
                progress += 0.05;
                progressFill.style.width = `${progress}%`;
            }
        }, 100);

        // Interaction for the heart button
        const heartBtn = document.querySelector('.fill-icon').parentElement;
        heartBtn.addEventListener('click', () => {
            const icon = heartBtn.querySelector('.material-symbols-outlined');
            const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
            icon.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
            if (!isFilled) {
                icon.classList.remove('text-on-surface-variant');
                icon.classList.add('text-primary');
            } else {
                icon.classList.add('text-on-surface-variant');
                icon.classList.remove('text-primary');
            }
        });
    </script>
